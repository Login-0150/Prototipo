kind = "web"
previewPath = "/"
title = "Discord Music Hub"
version = "1.0.0"
id = "artifacts/discord-music"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20076

[services.development]
run = "pnpm --filter @workspace/discord-music run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-music", "run", "build" ]
publicDir = "artifacts/discord-music/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20076"
BASE_PATH = "/"
